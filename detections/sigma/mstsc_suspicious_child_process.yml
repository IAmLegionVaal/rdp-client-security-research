title: Suspicious Child Process Spawned By MSTSC
id: 0d6c6b83-9a32-4219-9316-rdpclient001
status: experimental
description: Detects suspicious script or command interpreters spawned by the Microsoft RDP client.
author: Dewald Pretorius
logsource:
  product: windows
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith: '\mstsc.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
  condition: selection_parent and selection_child
fields:
  - UtcTime
  - Computer
  - User
  - ParentImage
  - Image
  - CommandLine
falsepositives:
  - Rare admin tooling or support workflows
level: high
tags:
  - attack.t1021.001
  - attack.t1059
